<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Trip 2026 - Collaborative Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }
        h1 { color: #f1f5f9; font-size: 2.5em; margin-bottom: 10px; }
        .trip-dates { color: #94a3b8; font-size: 1.1em; margin-bottom: 15px; }
        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .config-notice {
            background: #fef3c7;
            color: #92400e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #f59e0b;
        }
        .config-notice h3 { margin-bottom: 10px; }
        .config-form {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }
        .config-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
        }
        .config-form button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
        }
        .config-form button:hover { background: #5568d3; }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .card h2 {
            color: #f1f5f9;
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
            border: 1px solid #334155;
        }
        .day-card:hover { transform: translateX(5px); }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .day-info h3 { color: #818cf8; font-size: 1.3em; margin-bottom: 5px; }
        .location { color: #94a3b8; font-size: 0.95em; margin-bottom: 5px; }
        .date { color: #64748b; font-size: 0.9em; }
        .cost-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .highlights {
            color: #cbd5e1;
            line-height: 1.6;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }
        .activities-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #334155;
        }
        .activities-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .activities-header h4 {
            color: #f1f5f9;
            font-size: 1em;
        }
        .add-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .add-btn:hover { background: #5568d3; }
        .activity-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .activity-content { flex: 1; }
        .activity-name { color: #f1f5f9; font-weight: 500; margin-bottom: 4px; }
        .activity-time { color: #94a3b8; font-size: 0.85em; }
        .activity-cost {
            color: #10b981;
            font-weight: 600;
            font-size: 0.9em;
            margin-top: 4px;
        }
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .delete-btn:hover { background: #ee5a6f; }
        .expense-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .expense-content { flex: 1; }
        .expense-name { color: #f1f5f9; font-weight: 500; }
        .expense-date { color: #94a3b8; font-size: 0.85em; }
        .expense-amount {
            color: #ef4444;
            font-weight: 700;
            font-size: 1.1em;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #334155;
        }
        .modal-header { margin-bottom: 20px; }
        .modal-header h3 { color: #f1f5f9; font-size: 1.5em; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            background: #0f172a;
            color: #f1f5f9;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        .budget-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #334155;
        }
        .budget-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: #94a3b8;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .budget-tab.active {
            color: #818cf8;
            border-bottom-color: #818cf8;
        }
        .budget-tab:hover {
            color: #818cf8;
        }
        .budget-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #334155;
            background: #0f172a;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .budget-item.editable {
            cursor: pointer;
            transition: all 0.2s;
        }
        .budget-item.editable:hover {
            background: #1e293b;
            border-color: #667eea;
        }
        .budget-item.total {
            font-weight: bold;
            color: #818cf8;
            padding-top: 15px;
            margin-top: 10px;
            border-top: 2px solid #667eea;
            background: #1e293b;
        }
        .budget-item-content {
            flex: 1;
            color: #cbd5e1;
        }
        .budget-item-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .budget-item:hover .budget-item-actions {
            opacity: 1;
        }
        .edit-btn, .delete-budget-btn {
            background: #334155;
            color: #cbd5e1;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75em;
        }
        .edit-btn:hover {
            background: #475569;
        }
        .delete-budget-btn {
            background: #7f1d1d;
        }
        .delete-budget-btn:hover {
            background: #991b1b;
        }
        .budget-comparison {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .budget-projected {
            color: #999;
            font-size: 0.9em;
            text-decoration: line-through;
        }
        .budget-actual {
            color: #10b981;
            font-weight: 600;
        }
        .budget-savings {
            color: #10b981;
            font-size: 0.85em;
            background: #f0fdf4;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .budget-overspend {
            color: #ef4444;
            font-size: 0.85em;
            background: #fef2f2;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .budget-progress {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .budget-progress-bar {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin: 8px 0;
        }
        .budget-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 0.3s ease, background 0.3s ease;
        }
        .budget-progress-fill.warning {
            background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%);
        }
        .budget-progress-fill.danger {
            background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
        }
        .budget-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .budget-summary-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .budget-summary-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }
        .budget-summary-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        .budget-summary-value.positive {
            color: #10b981;
        }
        .budget-summary-value.negative {
            color: #ef4444;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 1.2em;
        }
        .no-activities {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 10px;
        }
        @media (max-width: 968px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2em; }
            .budget-summary { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const defaultBudget = [
            {category:"Round-trip Flights (2 people)",projected:2000},
            {category:"Hotels (14 nights)",projected:1200},
            {category:"Shinkansen",projected:260},
            {category:"Local Transport",projected:150},
            {category:"Tokyo Disneyland",projected:75},
            {category:"Universal Studios Japan",projected:75},
            {category:"Food ($40/day x 14)",projected:560},
            {category:"Temple/Shrine fees",projected:50},
            {category:"SIM card",projected:30},
            {category:"Souvenirs",projected:150},
            {category:"Emergency Buffer",projected:150}
        ];

        const itineraryDays = [
            {date:"2026-07-19",day:"Day 1",location:"Tokyo (Shinjuku / Shibuya)",highlights:"Arrive in Tokyo; explore Shibuya Crossing, Hachikō, izakaya dinner",cost:100},
            {date:"2026-07-20",day:"Day 2",location:"Tokyo (Asakusa, Ueno, Akihabara)",highlights:"Senso-ji Temple, Nakamise Street, Ueno Park, Akihabara",cost:90},
            {date:"2026-07-21",day:"Day 3",location:"Tokyo Disneyland",highlights:"Full day at Tokyo Disneyland",cost:170},
            {date:"2026-07-22",day:"Day 4",location:"Tokyo (Harajuku / Shinjuku / Omotesandō)",highlights:"Meiji Shrine, Takeshita Street, Omotesandō, Golden Gai nightlife",cost:90},
            {date:"2026-07-23",day:"Day 5",location:"Tokyo → Kyoto (Shinkansen)",highlights:"Shinkansen to Kyoto (~2.5 hrs), evening around Kyoto Station",cost:185},
            {date:"2026-07-24",day:"Day 6",location:"Kyoto (Higashiyama / Gion)",highlights:"Kiyomizu-dera, Ninenzaka, Sannenzaka, Gion at night",cost:95},
            {date:"2026-07-25",day:"Day 7",location:"Kyoto (Arashiyama & Golden Pavilion)",highlights:"Arashiyama Bamboo Grove, Tenryu-ji, Togetsukyo Bridge, Kinkaku-ji",cost:95},
            {date:"2026-07-26",day:"Day 8",location:"Kyoto → Osaka (Dotonbori)",highlights:"Short train to Osaka; evening at Dotonbori (street food & neon signs)",cost:110},
            {date:"2026-07-27",day:"Day 9",location:"Osaka (Universal Studios Japan)",highlights:"Full day at Universal Studios Japan (Super Nintendo World, Harry Potter)",cost:160},
            {date:"2026-07-28",day:"Day 10",location:"Osaka (Castle & Umeda)",highlights:"Osaka Castle, Umeda Sky Building sunset",cost:95},
            {date:"2026-07-29",day:"Day 11",location:"Day trip to Nara (from Osaka)",highlights:"Day trip to Nara: Todai-ji, Nara Park (deer), Kasuga Taisha",cost:85},
            {date:"2026-07-30",day:"Day 12",location:"Osaka → Tokyo (Shinkansen)",highlights:"Return to Tokyo by Shinkansen; explore Nakameguro or teamLab",cost:185},
            {date:"2026-07-31",day:"Day 13",location:"Tokyo (Shopping / Free day)",highlights:"Shopping in Ginza/Akihabara or optional day trip (Yokohama/Kamakura)",cost:100},
            {date:"2026-08-01",day:"Day 14",location:"Tokyo (Departure)",highlights:"Final souvenirs; airport departure",cost:80}
        ];

        function App() {
            const [supabase, setSupabase] = useState(null);
            const [configured, setConfigured] = useState(false);
            const [activities, setActivities] = useState({});
            const [expenses, setExpenses] = useState([]);
            const [budgetTab, setBudgetTab] = useState('overview');
            const [modalOpen, setModalOpen] = useState(false);
            const [expenseModalOpen, setExpenseModalOpen] = useState(false);
            const [currentDay, setCurrentDay] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // Auto-configure with hardcoded credentials
                const SUPABASE_URL = 'https://rcxciqtrppqovnkibyka.supabase.co';
                const SUPABASE_ANON_KEY = 'sb_publishable_JcgNw86HC5RRO3BCWYraxw_s2S4wiNe';
                
                const savedUrl = localStorage.getItem('supabase_url') || SUPABASE_URL;
                const savedKey = localStorage.getItem('supabase_key') || SUPABASE_ANON_KEY;
                
                // Auto-save for future visits
                localStorage.setItem('supabase_url', savedUrl);
                localStorage.setItem('supabase_key', savedKey);
                
                initSupabase(savedUrl, savedKey);
            }, []);

            const initSupabase = (url, key) => {
                const client = window.supabase.createClient(url, key);
                setSupabase(client);
                setConfigured(true);
                loadData(client);
                subscribeToChanges(client);
            };

            const handleConfig = (e) => {
                e.preventDefault();
                const url = e.target.supabase_url.value.trim();
                const key = e.target.supabase_key.value.trim();
                
                if (!url || !key) {
                    alert('Please fill in both fields');
                    return;
                }

                localStorage.setItem('supabase_url', url);
                localStorage.setItem('supabase_key', key);
                initSupabase(url, key);
            };

            const loadData = async (client) => {
                setLoading(true);
                
                // Load activities
                const { data: activitiesData } = await client.from('activities').select('*');
                if (activitiesData) {
                    const grouped = {};
                    activitiesData.forEach(act => {
                        if (!grouped[act.day_index]) grouped[act.day_index] = [];
                        grouped[act.day_index].push(act);
                    });
                    setActivities(grouped);
                }

                // Load expenses
                const { data: expensesData } = await client.from('expenses').select('*').order('date', { ascending: false });
                if (expensesData) {
                    setExpenses(expensesData);
                }
                
                setLoading(false);
            };

            const subscribeToChanges = (client) => {
                client.channel('realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'activities' }, () => loadData(client))
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, () => loadData(client))
                    .subscribe();
            };

            const addActivity = async (dayIndex, activity) => {
                if (!supabase) return;
                await supabase.from('activities').insert([{ day_index: dayIndex, ...activity }]);
            };

            const deleteActivity = async (id) => {
                if (!supabase || !confirm('Delete this activity?')) return;
                await supabase.from('activities').delete().eq('id', id);
            };

            const addExpense = async (expense) => {
                if (!supabase) return;
                await supabase.from('expenses').insert([expense]);
            };

            const deleteExpense = async (id) => {
                if (!supabase || !confirm('Delete this expense?')) return;
                await supabase.from('expenses').delete().eq('id', id);
            };

            const calculateBudget = () => {
                const projectedTotal = defaultBudget.reduce((sum, item) => sum + item.projected, 0);
                const actualTotal = expenses.reduce((sum, exp) => sum + exp.amount, 0);
                const difference = projectedTotal - actualTotal;
                const percentUsed = (actualTotal / 5000) * 100;
                
                return { projectedTotal, actualTotal, difference, percentUsed };
            };

            if (loading) return <div className="loading">Loading...</div>;

            const budget = calculateBudget();

            return (
                <div className="container">
                    <header>
                        <h1>🇯🇵 Japan Adventure 2026</h1>
                        <p className="trip-dates">July 19 - August 2, 2026 | 14 Days</p>
                        <span className="sync-badge">
                            <span className="sync-dot"></span>
                            Live Collaboration Active
                        </span>
                    </header>

                    <div className="dashboard-grid">
                        <div>
                            <div className="card">
                                <h2>📅 Daily Itinerary</h2>
                                {itineraryDays.map((day, index) => (
                                    <div key={index} className="day-card">
                                        <div className="day-header">
                                            <div className="day-info">
                                                <h3>{day.day}</h3>
                                                <div className="location">📍 {day.location}</div>
                                                <div className="date">{new Date(day.date).toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
                                            </div>
                                            <div className="cost-badge">${day.cost}</div>
                                        </div>
                                        <div className="highlights">{day.highlights}</div>
                                        <div className="activities-section">
                                            <div className="activities-header">
                                                <h4>🎯 Activities</h4>
                                                <button className="add-btn" onClick={() => { setCurrentDay(index); setModalOpen(true); }}>+ Add</button>
                                            </div>
                                            {activities[index] && activities[index].length > 0 ? (
                                                activities[index].map(act => (
                                                    <div key={act.id} className="activity-item">
                                                        <div className="activity-content">
                                                            <div className="activity-name">{act.name}</div>
                                                            <div className="activity-time">
                                                                {act.time && `⏰ ${act.time}`}
                                                                {act.notes && ` • ${act.notes}`}
                                                            </div>
                                                            {act.cost && <div className="activity-cost">💰 ${act.cost}</div>}
                                                        </div>
                                                        <button className="delete-btn" onClick={() => deleteActivity(act.id)}>Delete</button>
                                                    </div>
                                                ))
                                            ) : (
                                                <div className="no-activities">No activities yet</div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div>
                            <div className="card">
                                <h2>💰 Budget Tracker</h2>
                                
                                <div className="budget-tabs">
                                    <button className={`budget-tab ${budgetTab === 'overview' ? 'active' : ''}`} onClick={() => setBudgetTab('overview')}>
                                        Overview
                                    </button>
                                    <button className={`budget-tab ${budgetTab === 'expenses' ? 'active' : ''}`} onClick={() => setBudgetTab('expenses')}>
                                        Expenses ({expenses.length})
                                    </button>
                                </div>

                                {budgetTab === 'overview' && (
                                    <>
                                        <div className="budget-summary">
                                            <div className="budget-summary-item">
                                                <div className="budget-summary-label">Projected</div>
                                                <div className="budget-summary-value">${budget.projectedTotal}</div>
                                            </div>
                                            <div className="budget-summary-item">
                                                <div className="budget-summary-label">Actual Spent</div>
                                                <div className={`budget-summary-value ${budget.actualTotal <= budget.projectedTotal ? 'positive' : 'negative'}`}>
                                                    ${budget.actualTotal}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="budget-progress">
                                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px',fontSize:'0.9em'}}>
                                                <strong>Budget Used:</strong>
                                                <strong>${budget.actualTotal} / $5,000</strong>
                                            </div>
                                            <div className="budget-progress-bar">
                                                <div className={`budget-progress-fill ${budget.percentUsed > 90 ? 'danger' : budget.percentUsed > 75 ? 'warning' : ''}`} 
                                                     style={{width: `${Math.min(budget.percentUsed, 100)}%`}}>
                                                    {budget.percentUsed.toFixed(0)}%
                                                </div>
                                            </div>
                                            <div style={{textAlign:'center',marginTop:'10px',fontWeight:'bold',fontSize:'0.95em',color: budget.difference >= 0 ? '#10b981' : '#ef4444'}}>
                                                {budget.difference >= 0 ? '✅ Under Budget: ' : '⚠️ Over Budget: '}
                                                ${Math.abs(budget.difference)}
                                            </div>
                                        </div>

                                        {defaultBudget.map((item, i) => {
                                            const categoryExpenses = expenses.filter(e => e.category === item.category);
                                            const actualCost = categoryExpenses.reduce((sum, e) => sum + e.amount, 0);
                                            const hasSavings = actualCost > 0 && actualCost < item.projected;
                                            const hasOverspend = actualCost > item.projected;

                                            return (
                                                <div key={i} className="budget-item">
                                                    <span>{item.category}</span>
                                                    <div className="budget-comparison">
                                                        {actualCost > 0 ? (
                                                            <>
                                                                <span className="budget-projected">${item.projected}</span>
                                                                <span className="budget-actual">${actualCost}</span>
                                                                {hasSavings && <span className="budget-savings">-${item.projected - actualCost}</span>}
                                                                {hasOverspend && <span className="budget-overspend">+${actualCost - item.projected}</span>}
                                                            </>
                                                        ) : (
                                                            <span>${item.projected}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </>
                                )}

                                {budgetTab === 'expenses' && (
                                    <>
                                        <button className="add-btn" style={{width:'100%',marginBottom:'15px'}} onClick={() => setExpenseModalOpen(true)}>
                                            + Add Expense
                                        </button>
                                        {expenses.length > 0 ? (
                                            expenses.map(exp => (
                                                <div key={exp.id} className="expense-item">
                                                    <div className="expense-content">
                                                        <div className="expense-name">{exp.description}</div>
                                                        <div className="expense-date">
                                                            {exp.category} • {new Date(exp.date).toLocaleDateString()}
                                                        </div>
                                                    </div>
                                                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                                                        <span className="expense-amount">${exp.amount}</span>
                                                        <button className="delete-btn" onClick={() => deleteExpense(exp.id)}>×</button>
                                                    </div>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="no-activities">No expenses tracked yet</div>
                                        )}
                                    </>
                                )}
                            </div>
                        </div>
                    </div>

                    {modalOpen && <ActivityModal onClose={() => setModalOpen(false)} onAdd={(act) => { addActivity(currentDay, act); setModalOpen(false); }} />}
                    {expenseModalOpen && <ExpenseModal onClose={() => setExpenseModalOpen(false)} onAdd={(exp) => { addExpense(exp); setExpenseModalOpen(false); }} />}
                </div>
            );
        }

        function ActivityModal({ onClose, onAdd }) {
            const [name, setName] = useState('');
            const [time, setTime] = useState('');
            const [notes, setNotes] = useState('');
            const [cost, setCost] = useState('');

            return (
                <div className="modal active" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <h3>Add Activity</h3>
                        <form onSubmit={(e) => { e.preventDefault(); onAdd({ name, time, notes, cost: cost ? parseFloat(cost) : null }); }}>
                            <div className="form-group">
                                <label>Activity Name *</label>
                                <input type="text" value={name} onChange={(e) => setName(e.target.value)} required />
                            </div>
                            <div className="form-group">
                                <label>Time</label>
                                <input type="time" value={time} onChange={(e) => setTime(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>Cost (optional)</label>
                                <input type="number" step="0.01" value={cost} onChange={(e) => setCost(e.target.value)} placeholder="0.00" />
                            </div>
                            <div className="form-group">
                                <label>Notes</label>
                                <textarea value={notes} onChange={(e) => setNotes(e.target.value)} />
                            </div>
                            <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
                                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                                <button type="submit" className="btn btn-primary">Add</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function ExpenseModal({ onClose, onAdd }) {
            const [description, setDescription] = useState('');
            const [amount, setAmount] = useState('');
            const [category, setCategory] = useState(defaultBudget[0].category);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);

            return (
                <div className="modal active" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <h3>Add Expense</h3>
                        <form onSubmit={(e) => { e.preventDefault(); onAdd({ description, amount: parseFloat(amount), category, date }); }}>
                            <div className="form-group">
                                <label>Description *</label>
                                <input type="text" value={description} onChange={(e) => setDescription(e.target.value)} required placeholder="e.g., Lunch at Tsukiji Market" />
                            </div>
                            <div className="form-group">
                                <label>Amount ($) *</label>
                                <input type="number" step="0.01" value={amount} onChange={(e) => setAmount(e.target.value)} required placeholder="0.00" />
                            </div>
                            <div className="form-group">
                                <label>Category *</label>
                                <select value={category} onChange={(e) => setCategory(e.target.value)}>
                                    {defaultBudget.map((item, i) => (
                                        <option key={i} value={item.category}>{item.category}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="form-group">
                                <label>Date *</label>
                                <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required />
                            </div>
                            <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
                                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                                <button type="submit" className="btn btn-primary">Add Expense</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
