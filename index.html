<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Trip 2026 - Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 20px;
            color: #f1f5f9;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }
        h1 { color: #f1f5f9; font-size: 2.5em; margin-bottom: 10px; }
        .trip-dates { color: #94a3b8; font-size: 1.1em; margin-bottom: 15px; }
        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .card h2 {
            color: #f1f5f9;
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #818cf8;
            transition: transform 0.2s;
            border: 1px solid #334155;
        }
        .day-card:hover { transform: translateX(5px); }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .day-info h3 { color: #818cf8; font-size: 1.3em; margin-bottom: 5px; }
        .location { color: #94a3b8; font-size: 0.95em; margin-bottom: 5px; }
        .date { color: #64748b; font-size: 0.9em; }
        .cost-badge {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .highlights {
            color: #cbd5e1;
            line-height: 1.6;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }
        .activities-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #334155;
        }
        .activities-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .activities-header h4 { color: #f1f5f9; }
        .add-btn {
            background: #818cf8;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .add-btn:hover { 
            background: #6366f1; 
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.6),
                        0 0 40px rgba(129, 140, 248, 0.4),
                        0 0 60px rgba(129, 140, 248, 0.2);
            animation: shine 1.5s ease-in-out infinite;
        }
        .add-btn:active {
            animation: flashRed 0.3s ease;
            transform: scale(0.98);
        }
        @keyframes shine {
            0%, 100% {
                box-shadow: 0 0 20px rgba(129, 140, 248, 0.6),
                            0 0 40px rgba(129, 140, 248, 0.4),
                            0 0 60px rgba(129, 140, 248, 0.2);
            }
            50% {
                box-shadow: 0 0 30px rgba(129, 140, 248, 0.8),
                            0 0 60px rgba(129, 140, 248, 0.6),
                            0 0 90px rgba(129, 140, 248, 0.4);
            }
        }
        @keyframes flashRed {
            0%, 100% {
                background: #6366f1;
            }
            50% {
                background: #ef4444;
                box-shadow: 0 0 30px rgba(239, 68, 68, 0.8);
            }
        }
        .activity-item, .expense-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .activity-content, .expense-content { flex: 1; }
        .activity-name, .expense-name { color: #f1f5f9; font-weight: 500; margin-bottom: 4px; }
        .activity-time, .expense-date { color: #94a3b8; font-size: 0.85em; }
        .activity-cost {
            color: #10b981;
            font-weight: 600;
            font-size: 0.9em;
            margin-top: 4px;
        }
        .expense-amount {
            color: #ef4444;
            font-weight: 700;
            font-size: 1.1em;
        }
        .delete-btn {
            background: #7f1d1d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s;
        }
        .delete-btn:hover { 
            background: #991b1b;
            transform: scale(1.05);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #334155;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header { margin-bottom: 20px; }
        .modal-header h3 { color: #f1f5f9; font-size: 1.5em; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            background: #0f172a;
            color: #f1f5f9;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #818cf8;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
        }
        .btn-primary { background: #818cf8; color: white; }
        .btn-primary:hover { background: #6366f1; }
        .btn-secondary { background: #334155; color: #f1f5f9; }
        .btn-secondary:hover { background: #475569; }
        
        .budget-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #334155;
        }
        .budget-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: #94a3b8;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .budget-tab.active {
            color: #818cf8;
            border-bottom-color: #818cf8;
        }
        .budget-tab:hover { color: #818cf8; }
        
        .budget-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #334155;
            background: #0f172a;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .budget-item:hover {
            background: #1e293b;
            border-color: #818cf8;
        }
        .budget-item-content {
            flex: 1;
            color: #f1f5f9;
        }
        .budget-item-actions {
            display: flex;
            gap: 8px;
        }
        .edit-btn {
            background: #334155;
            color: #cbd5e1;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .edit-btn:hover {
            background: #475569;
        }
        .budget-comparison {
            display: flex;
            gap: 8px;
            align-items: center;
            color: #f1f5f9;
        }
        .budget-projected {
            color: #64748b;
            font-size: 0.9em;
            text-decoration: line-through;
        }
        .budget-actual {
            color: #10b981;
            font-weight: 600;
        }
        .budget-savings {
            color: #10b981;
            font-size: 0.85em;
            background: #022c22;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .budget-overspend {
            color: #ef4444;
            font-size: 0.85em;
            background: #450a0a;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .budget-progress {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #334155;
        }
        .budget-progress-bar {
            width: 100%;
            height: 30px;
            background: #0f172a;
            border-radius: 15px;
            overflow: hidden;
            margin: 8px 0;
            border: 1px solid #334155;
        }
        .budget-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 0.3s ease, background 0.3s ease;
        }
        .budget-progress-fill.warning {
            background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%);
        }
        .budget-progress-fill.danger {
            background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
        }
        .budget-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .budget-summary-item {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }
        .budget-summary-label {
            font-size: 0.85em;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        .budget-summary-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #f1f5f9;
        }
        .budget-summary-value.positive { color: #10b981; }
        .budget-summary-value.negative { color: #ef4444; }
        
        .link-button {
            display: block;
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            color: white;
            padding: 12px 16px;
            borderRadius: 8px;
            textDecoration: none;
            transition: all 0.2s;
            border: 1px solid #6366f1;
            margin-bottom: 12px;
        }
        .link-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.4);
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #cbd5e1;
            font-size: 1.2em;
        }
        .no-activities {
            color: #64748b;
            font-style: italic;
            text-align: center;
            padding: 10px;
        }
        .error-message {
            background: #7f1d1d;
            color: #fecaca;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #991b1b;
        }
        @media (max-width: 968px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2em; }
            .budget-summary { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const itineraryDays = [
            {date:"2026-07-19",day:"Day 1",location:"Tokyo (Shinjuku / Shibuya)",highlights:"Arrive in Tokyo; explore Shibuya Crossing, Hachikō, izakaya dinner",cost:100},
            {date:"2026-07-20",day:"Day 2",location:"Tokyo (Asakusa, Ueno, Akihabara)",highlights:"Senso-ji Temple, Nakamise Street, Ueno Park, Akihabara",cost:90},
            {date:"2026-07-21",day:"Day 3",location:"Tokyo Disneyland",highlights:"Full day at Tokyo Disneyland",cost:170},
            {date:"2026-07-22",day:"Day 4",location:"Tokyo (Harajuku / Shinjuku / Omotesandō)",highlights:"Meiji Shrine, Takeshita Street, Omotesandō, Golden Gai nightlife",cost:90},
            {date:"2026-07-23",day:"Day 5",location:"Tokyo → Kyoto (Shinkansen)",highlights:"Shinkansen to Kyoto (~2.5 hrs), evening around Kyoto Station",cost:185},
            {date:"2026-07-24",day:"Day 6",location:"Kyoto (Higashiyama / Gion)",highlights:"Kiyomizu-dera, Ninenzaka, Sannenzaka, Gion at night",cost:95},
            {date:"2026-07-25",day:"Day 7",location:"Kyoto (Arashiyama & Golden Pavilion)",highlights:"Arashiyama Bamboo Grove, Tenryu-ji, Togetsukyo Bridge, Kinkaku-ji",cost:95},
            {date:"2026-07-26",day:"Day 8",location:"Kyoto → Osaka (Dotonbori)",highlights:"Short train to Osaka; evening at Dotonbori (street food & neon signs)",cost:110},
            {date:"2026-07-27",day:"Day 9",location:"Osaka (Universal Studios Japan)",highlights:"Full day at Universal Studios Japan (Super Nintendo World, Harry Potter)",cost:160},
            {date:"2026-07-28",day:"Day 10",location:"Osaka (Castle & Umeda)",highlights:"Osaka Castle, Umeda Sky Building sunset",cost:95},
            {date:"2026-07-29",day:"Day 11",location:"Day trip to Nara (from Osaka)",highlights:"Day trip to Nara: Todai-ji, Nara Park (deer), Kasuga Taisha",cost:85},
            {date:"2026-07-30",day:"Day 12",location:"Osaka → Tokyo (Shinkansen)",highlights:"Return to Tokyo by Shinkansen; explore Nakameguro or teamLab",cost:185},
            {date:"2026-07-31",day:"Day 13",location:"Tokyo (Shopping / Free day)",highlights:"Shopping in Ginza/Akihabara or optional day trip (Yokohama/Kamakura)",cost:100},
            {date:"2026-08-01",day:"Day 14",location:"Tokyo (Departure)",highlights:"Final souvenirs; airport departure",cost:80}
        ];

        function App() {
            const [supabase, setSupabase] = useState(null);
            const [activities, setActivities] = useState({});
            const [expenses, setExpenses] = useState([]);
            const [budgetCategories, setBudgetCategories] = useState([]);
            const [links, setLinks] = useState([]);
            const [itinerary, setItinerary] = useState(itineraryDays);
            const [budgetTab, setBudgetTab] = useState('overview');
            const [modalOpen, setModalOpen] = useState(false);
            const [expenseModalOpen, setExpenseModalOpen] = useState(false);
            const [budgetModalOpen, setBudgetModalOpen] = useState(false);
            const [dayModalOpen, setDayModalOpen] = useState(false);
            const [linkModalOpen, setLinkModalOpen] = useState(false);
            const [currentDay, setCurrentDay] = useState(null);
            const [editingBudget, setEditingBudget] = useState(null);
            const [editingDay, setEditingDay] = useState(null);
            const [editingLink, setEditingLink] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const SUPABASE_URL = 'https://rcxciqtrppqovnkibyka.supabase.co';
                const SUPABASE_ANON_KEY = 'sb_publishable_JcgNw86HC5RRO3BCWYraxw_s2S4wiNe';
                
                const savedUrl = localStorage.getItem('supabase_url') || SUPABASE_URL;
                const savedKey = localStorage.getItem('supabase_key') || SUPABASE_ANON_KEY;
                
                localStorage.setItem('supabase_url', savedUrl);
                localStorage.setItem('supabase_key', savedKey);
                
                const savedItinerary = localStorage.getItem('itinerary');
                if (savedItinerary) {
                    try {
                        setItinerary(JSON.parse(savedItinerary));
                    } catch (e) {
                        console.error('Failed to parse saved itinerary');
                    }
                }
                
                initSupabase(savedUrl, savedKey);
            }, []);

            const initSupabase = (url, key) => {
                try {
                    const client = window.supabase.createClient(url, key);
                    setSupabase(client);
                    loadData(client);
                    subscribeToChanges(client);
                } catch (err) {
                    setError('Failed to connect to database: ' + err.message);
                    setLoading(false);
                }
            };

            const loadData = async (client) => {
                setLoading(true);
                setError(null);
                
                try {
                    const [activitiesRes, expensesRes, budgetRes, linksRes] = await Promise.all([
                        client.from('activities').select('*'),
                        client.from('expenses').select('*').order('date', { ascending: false }),
                        client.from('budget_categories').select('*').order('sort_order'),
                        client.from('links').select('*').order('sort_order')
                    ]);

                    if (activitiesRes.data) {
                        const grouped = {};
                        activitiesRes.data.forEach(act => {
                            if (!grouped[act.day_index]) grouped[act.day_index] = [];
                            grouped[act.day_index].push(act);
                        });
                        setActivities(grouped);
                    }

                    if (expensesRes.data) setExpenses(expensesRes.data);
                    
                    if (budgetRes.data && budgetRes.data.length === 0) {
                        const defaultCategories = [
                            {category:"Round-trip Flights (2 people)",projected:2000,sort_order:1},
                            {category:"Hotels (14 nights)",projected:1200,sort_order:2},
                            {category:"Shinkansen",projected:260,sort_order:3},
                            {category:"Local Transport",projected:150,sort_order:4},
                            {category:"Tokyo Disneyland",projected:75,sort_order:5},
                            {category:"Universal Studios Japan",projected:75,sort_order:6},
                            {category:"Food ($40/day x 14)",projected:560,sort_order:7},
                            {category:"Temple/Shrine fees",projected:50,sort_order:8},
                            {category:"SIM card",projected:30,sort_order:9},
                            {category:"Souvenirs",projected:150,sort_order:10},
                            {category:"Emergency Buffer",projected:150,sort_order:11}
                        ];
                        
                        const { error: insertError } = await client.from('budget_categories').insert(defaultCategories);
                        if (!insertError) {
                            const { data: newBudgetData } = await client.from('budget_categories').select('*').order('sort_order');
                            if (newBudgetData) setBudgetCategories(newBudgetData);
                        }
                    } else if (budgetRes.data) {
                        setBudgetCategories(budgetRes.data);
                    }

                    if (linksRes.data) setLinks(linksRes.data);
                } catch (err) {
                    setError('Failed to load data: ' + err.message);
                }
                
                setLoading(false);
            };

            const subscribeToChanges = (client) => {
                client.channel('realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'activities' }, () => loadData(client))
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, () => loadData(client))
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'budget_categories' }, () => loadData(client))
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'links' }, () => loadData(client))
                    .subscribe();
            };

            const addActivity = async (dayIndex, activity) => {
                if (!supabase) return;
                try {
                    const { error } = await supabase.from('activities').insert([{ day_index: dayIndex, ...activity }]);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to add activity: ' + err.message);
                }
            };

            const deleteActivity = async (id) => {
                if (!supabase || !confirm('Delete this activity?')) return;
                try {
                    const { error } = await supabase.from('activities').delete().eq('id', id);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to delete activity: ' + err.message);
                }
            };

            const addExpense = async (expense) => {
                if (!supabase) return;
                try {
                    const { error } = await supabase.from('expenses').insert([expense]);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to add expense: ' + err.message);
                }
            };

            const deleteExpense = async (id) => {
                if (!supabase || !confirm('Delete this expense?')) return;
                try {
                    const { error } = await supabase.from('expenses').delete().eq('id', id);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to delete expense: ' + err.message);
                }
            };

            const addBudgetCategory = async (category) => {
                if (!supabase) return;
                try {
                    const maxSort = budgetCategories.length > 0 ? Math.max(...budgetCategories.map(b => b.sort_order || 0), 0) : 0;
                    const { error } = await supabase.from('budget_categories').insert([{ ...category, sort_order: maxSort + 1 }]);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to add budget category: ' + err.message);
                    console.error('Budget error:', err);
                }
            };

            const updateBudgetCategory = async (id, updates) => {
                if (!supabase) return;
                try {
                    const { error } = await supabase.from('budget_categories').update(updates).eq('id', id);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to update budget: ' + err.message);
                }
            };

            const deleteBudgetCategory = async (id) => {
                if (!supabase || !confirm('Delete this budget category?')) return;
                try {
                    const { error } = await supabase.from('budget_categories').delete().eq('id', id);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to delete budget category: ' + err.message);
                }
            };

            const updateDay = (index, updates) => {
                const newItinerary = [...itinerary];
                newItinerary[index] = { ...newItinerary[index], ...updates };
                setItinerary(newItinerary);
                localStorage.setItem('itinerary', JSON.stringify(newItinerary));
            };

            const deleteDay = (index) => {
                if (!confirm('Delete this entire day from the itinerary?')) return;
                const newItinerary = itinerary.filter((_, i) => i !== index);
                setItinerary(newItinerary);
                localStorage.setItem('itinerary', JSON.stringify(newItinerary));
            };

            const addDay = (day) => {
                const newItinerary = [...itinerary, day];
                setItinerary(newItinerary);
                localStorage.setItem('itinerary', JSON.stringify(newItinerary));
            };

            const addLink = async (link) => {
                if (!supabase) return;
                try {
                    const maxSort = links.length > 0 ? Math.max(...links.map(l => l.sort_order || 0), 0) : 0;
                    const { error } = await supabase.from('links').insert([{ ...link, sort_order: maxSort + 1 }]);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to add link: ' + err.message);
                }
            };

            const updateLink = async (id, updates) => {
                if (!supabase) return;
                try {
                    const { error } = await supabase.from('links').update(updates).eq('id', id);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to update link: ' + err.message);
                }
            };

            const deleteLink = async (id) => {
                if (!supabase || !confirm('Delete this link?')) return;
                try {
                    const { error } = await supabase.from('links').delete().eq('id', id);
                    if (error) throw error;
                } catch (err) {
                    alert('Failed to delete link: ' + err.message);
                }
            };

            const calculateBudget = () => {
                const projectedTotal = budgetCategories.reduce((sum, item) => sum + parseFloat(item.projected), 0);
                const actualTotal = expenses.reduce((sum, exp) => sum + exp.amount, 0);
                const difference = projectedTotal - actualTotal;
                const percentUsed = (actualTotal / 5000) * 100;
                
                return { projectedTotal, actualTotal, difference, percentUsed };
            };

            if (loading) return <div className="loading">Loading your trip dashboard...</div>;

            const budget = calculateBudget();

            return (
                <div className="container">
                    <header>
                        <h1>🇯🇵 Japan Adventure 2026</h1>
                        <p className="trip-dates">July 19 - August 2, 2026 | 14 Days</p>
                        <span className="sync-badge">
                            <span className="sync-dot"></span>
                            Live Sync Active
                        </span>
                    </header>

                    {error && <div className="error-message">⚠️ {error}</div>}

                    <div className="dashboard-grid">
                        <div>
                            <div className="card">
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
                                    <h2>📅 Daily Itinerary</h2>
                                    <button className="add-btn" onClick={() => { setEditingDay(null); setDayModalOpen(true); }}>+ Add Day</button>
                                </div>
                                {itinerary.map((day, index) => (
                                    <div key={index} className="day-card">
                                        <div className="day-header">
                                            <div className="day-info">
                                                <h3>{day.day}</h3>
                                                <div className="location">📍 {day.location}</div>
                                                <div className="date">{new Date(day.date).toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
                                            </div>
                                            <div style={{display:'flex',flexDirection:'column',gap:'8px',alignItems:'flex-end'}}>
                                                <div className="cost-badge">${day.cost}</div>
                                                <div style={{display:'flex',gap:'5px'}}>
                                                    <button className="edit-btn" onClick={() => { setEditingDay({...day, index}); setDayModalOpen(true); }}>Edit</button>
                                                    <button className="delete-btn" onClick={() => deleteDay(index)}>Delete</button>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="highlights">{day.highlights}</div>
                                        <div className="activities-section">
                                            <div className="activities-header">
                                                <h4>🎯 Activities</h4>
                                                <button className="add-btn" onClick={() => { setCurrentDay(index); setModalOpen(true); }}>+ Add Activity</button>
                                            </div>
                                            {activities[index] && activities[index].length > 0 ? (
                                                activities[index].map(act => (
                                                    <div key={act.id} className="activity-item">
                                                        <div className="activity-content">
                                                            <div className="activity-name">{act.name}</div>
                                                            <div className="activity-time">
                                                                {act.time && `⏰ ${act.time}`}
                                                                {act.notes && ` • ${act.notes}`}
                                                            </div>
                                                            {act.cost && <div className="activity-cost">💰 ${act.cost}</div>}
                                                        </div>
                                                        <button className="delete-btn" onClick={() => deleteActivity(act.id)}>Delete</button>
                                                    </div>
                                                ))
                                            ) : (
                                                <div className="no-activities">No activities added yet</div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div>
                            <div className="card">
                                <h2>💰 Budget Tracker</h2>
                                
                                <div className="budget-tabs">
                                    <button className={`budget-tab ${budgetTab === 'overview' ? 'active' : ''}`} onClick={() => setBudgetTab('overview')}>
                                        Overview
                                    </button>
                                    <button className={`budget-tab ${budgetTab === 'expenses' ? 'active' : ''}`} onClick={() => setBudgetTab('expenses')}>
                                        Expenses ({expenses.length})
                                    </button>
                                </div>

                                {budgetTab === 'overview' && (
                                    <>
                                        <div className="budget-summary">
                                            <div className="budget-summary-item">
                                                <div className="budget-summary-label">Projected</div>
                                                <div className="budget-summary-value">${budget.projectedTotal.toFixed(0)}</div>
                                            </div>
                                            <div className="budget-summary-item">
                                                <div className="budget-summary-label">Actual Spent</div>
                                                <div className={`budget-summary-value ${budget.actualTotal <= budget.projectedTotal ? 'positive' : 'negative'}`}>
                                                    ${budget.actualTotal.toFixed(0)}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="budget-progress">
                                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px',fontSize:'0.9em',color:'#f1f5f9'}}>
                                                <strong>Budget Used:</strong>
                                                <strong>${budget.actualTotal.toFixed(0)} / $5,000</strong>
                                            </div>
                                            <div className="budget-progress-bar">
                                                <div className={`budget-progress-fill ${budget.percentUsed > 90 ? 'danger' : budget.percentUsed > 75 ? 'warning' : ''}`} 
                                                     style={{width: `${Math.min(budget.percentUsed, 100)}%`}}>
                                                    {budget.percentUsed.toFixed(0)}%
                                                </div>
                                            </div>
                                            <div style={{textAlign:'center',marginTop:'10px',fontWeight:'bold',fontSize:'0.95em',color: budget.difference >= 0 ? '#10b981' : '#ef4444'}}>
                                                {budget.difference >= 0 ? '✅ Under Budget: ' : '⚠️ Over Budget: '}
                                                ${Math.abs(budget.difference).toFixed(0)}
                                            </div>
                                        </div>

                                        <div style={{marginTop:'20px'}}>
                                            <button className="add-btn" style={{width:'100%',marginBottom:'15px'}} onClick={() => { setEditingBudget(null); setBudgetModalOpen(true); }}>
                                                + Add Budget Category
                                            </button>
                                        </div>

                                        {budgetCategories.map((item) => {
                                            const categoryExpenses = expenses.filter(e => e.category === item.category);
                                            const actualCost = categoryExpenses.reduce((sum, e) => sum + e.amount, 0);
                                            const hasSavings = actualCost > 0 && actualCost < item.projected;
                                            const hasOverspend = actualCost > item.projected;

                                            return (
                                                <div key={item.id} className="budget-item">
                                                    <div className="budget-item-content">
                                                        <span>{item.category}</span>
                                                    </div>
                                                    <div className="budget-comparison">
                                                        {actualCost > 0 ? (
                                                            <>
                                                                <span className="budget-projected">${item.projected}</span>
                                                                <span className="budget-actual">${actualCost.toFixed(0)}</span>
                                                                {hasSavings && <span className="budget-savings">-${(item.projected - actualCost).toFixed(0)}</span>}
                                                                {hasOverspend && <span className="budget-overspend">+${(actualCost - item.projected).toFixed(0)}</span>}
                                                            </>
                                                        ) : (
                                                            <span style={{color:'#f1f5f9'}}>${item.projected}</span>
                                                        )}
                                                    </div>
                                                    <div className="budget-item-actions">
                                                        <button className="edit-btn" onClick={() => { setEditingBudget(item); setBudgetModalOpen(true); }}>Edit</button>
                                                        <button className="delete-btn" onClick={() => deleteBudgetCategory(item.id)}>Delete</button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </>
                                )}

                                {budgetTab === 'expenses' && (
                                    <>
                                        <button className="add-btn" style={{width:'100%',marginBottom:'15px'}} onClick={() => setExpenseModalOpen(true)}>
                                            + Add Expense
                                        </button>
                                        {expenses.length > 0 ? (
                                            expenses.map(exp => (
                                                <div key={exp.id} className="expense-item">
                                                    <div className="expense-content">
                                                        <div className="expense-name">{exp.description}</div>
                                                        <div className="expense-date">
                                                            {exp.category} • {new Date(exp.date).toLocaleDateString()}
                                                        </div>
                                                    </div>
                                                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                                                        <span className="expense-amount">${exp.amount.toFixed(2)}</span>
                                                        <button className="delete-btn" onClick={() => deleteExpense(exp.id)}>×</button>
                                                    </div>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="no-activities">No expenses tracked yet</div>
                                        )}
                                    </>
                                )}
                            </div>

                            <div className="card">
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
                                    <h2>🔗 Links & Resources</h2>
                                    <button className="add-btn" onClick={() => { setEditingLink(null); setLinkModalOpen(true); }}>+ Add Link</button>
                                </div>
                                
                                {links.length > 0 ? (
                                    links.map(link => (
                                        <div key={link.id} style={{marginBottom:'12px'}}>
                                            <a 
                                                href={link.url} 
                                                target="_blank" 
                                                rel="noopener noreferrer"
                                                style={{
                                                    display: 'block',
                                                    background: 'linear-gradient(135deg, #818cf8 0%, #6366f1 100%)',
                                                    color: 'white',
                                                    padding: '12px 16px',
                                                    borderRadius: '8px',
                                                    textDecoration: 'none',
                                                    transition: 'all 0.2s',
                                                    border: '1px solid #6366f1'
                                                }}
                                                onMouseEnter={(e) => {
                                                    e.currentTarget.style.transform = 'scale(1.02)';
                                                    e.currentTarget.style.boxShadow = '0 0 20px rgba(129, 140, 248, 0.4)';
                                                }}
                                                onMouseLeave={(e) => {
                                                    e.currentTarget.style.transform = 'scale(1)';
                                                    e.currentTarget.style.boxShadow = 'none';
                                                }}
                                            >
                                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                                    <div style={{flex:1}}>
                                                        <div style={{fontWeight:'600',marginBottom:'4px'}}>{link.title}</div>
                                                        {link.description && <div style={{fontSize:'0.85em',opacity:0.9}}>{link.description}</div>}
                                                        {link.category && <div style={{fontSize:'0.75em',marginTop:'4px',opacity:0.7}}>📁 {link.category}</div>}
                                                    </div>
                                                    <div style={{display:'flex',gap:'8px',marginLeft:'10px'}}>
                                                        <button 
                                                            className="edit-btn" 
                                                            onClick={(e) => { 
                                                                e.preventDefault(); 
                                                                setEditingLink(link); 
                                                                setLinkModalOpen(true); 
                                                            }}
                                                            style={{background:'rgba(255,255,255,0.2)'}}
                                                        >
                                                            Edit
                                                        </button>
                                                        <button 
                                                            className="delete-btn" 
                                                            onClick={(e) => { 
                                                                e.preventDefault(); 
                                                                deleteLink(link.id); 
                                                            }}
                                                        >
                                                            Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            </a>
                                        </div>
                                    ))
                                ) : (
                                    <div className="no-activities">No links added yet</div>
                                )}
                            </div>
                        </div>
                    </div>

                    {modalOpen && <ActivityModal onClose={() => setModalOpen(false)} onAdd={(act) => { addActivity(currentDay, act); setModalOpen(false); }} />}
                    {expenseModalOpen && <ExpenseModal categories={budgetCategories} onClose={() => setExpenseModalOpen(false)} onAdd={(exp) => { addExpense(exp); setExpenseModalOpen(false); }} />}
                    {budgetModalOpen && <BudgetModal budget={editingBudget} onClose={() => setBudgetModalOpen(false)} onSave={(cat) => { editingBudget ? updateBudgetCategory(editingBudget.id, cat) : addBudgetCategory(cat); setBudgetModalOpen(false); }} />}
                    {dayModalOpen && <DayModal day={editingDay} onClose={() => setDayModalOpen(false)} onSave={(d) => { editingDay ? updateDay(editingDay.index, d) : addDay(d); setDayModalOpen(false); }} />}
                    {linkModalOpen && <LinkModal link={editingLink} onClose={() => setLinkModalOpen(false)} onSave={(l) => { editingLink ? updateLink(editingLink.id, l) : addLink(l); setLinkModalOpen(false); }} />}
                </div>
            );
        }

        function ActivityModal({ onClose, onAdd }) {
            const [name, setName] = useState('');
            const [time, setTime] = useState('');
            const [notes, setNotes] = useState('');
            const [cost, setCost] = useState('');

            return (
                <div className="modal active" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>Add Activity</h3>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); if(name) onAdd({ name, time: time || null, notes: notes || null, cost: cost ? parseFloat(cost) : null }); }}>
                            <div className="form-group">
                                <label>Activity Name *</label>
                                <input type="text" value={name} onChange={(e) => setName(e.target.value)} required placeholder="e.g., Visit Sensoji Temple" />
                            </div>
                            <div className="form-group">
                                <label>Time</label>
                                <input type="time" value={time} onChange={(e) => setTime(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>Cost ($)</label>
                                <input type="number" step="0.01" value={cost} onChange={(e) => setCost(e.target.value)} placeholder="0.00" />
                            </div>
                            <div className="form-group">
                                <label>Notes</label>
                                <textarea value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Any special notes..."></textarea>
                            </div>
                            <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
                                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                                <button type="submit" className="btn btn-primary">Add Activity</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function ExpenseModal({ categories, onClose, onAdd }) {
            const [description, setDescription] = useState('');
            const [amount, setAmount] = useState('');
            const [category, setCategory] = useState(categories[0]?.category || '');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);

            return (
                <div className="modal active" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>Add Expense</h3>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); if(description && amount) onAdd({ description, amount: parseFloat(amount), category, date }); }}>
                            <div className="form-group">
                                <label>Description *</label>
                                <input type="text" value={description} onChange={(e) => setDescription(e.target.value)} required placeholder="e.g., Lunch at Tsukiji Market" />
                            </div>
                            <div className="form-group">
                                <label>Amount ($) *</label>
                                <input type="number" step="0.01" value={amount} onChange={(e) => setAmount(e.target.value)} required placeholder="0.00" />
                            </div>
                            <div className="form-group">
                                <label>Category *</label>
                                <select value={category} onChange={(e) => setCategory(e.target.value)}>
                                    {categories.map((cat, i) => (
                                        <option key={i} value={cat.category}>{cat.category}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="form-group">
                                <label>Date *</label>
                                <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required />
                            </div>
                            <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
                                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                                <button type="submit" className="btn btn-primary">Add Expense</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function BudgetModal({ budget, onClose, onSave }) {
            const [category, setCategory] = useState(budget?.category || '');
            const [projected, setProjected] = useState(budget?.projected || '');

            return (
                <div className="modal active" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{budget ? 'Edit Budget Category' : 'Add Budget Category'}</h3>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); if(category && projected) onSave({ category, projected: parseFloat(projected) }); }}>
                            <div className="form-group">
                                <label>Category Name *</label>
                                <input type="text" value={category} onChange={(e) => setCategory(e.target.value)} required placeholder="e.g., Gifts & Souvenirs" disabled={!!budget} />
                            </div>
                            <div className="form-group">
                                <label>Projected Amount ($) *</label>
                                <input type="number" step="0.01" value={projected} onChange={(e) => setProjected(e.target.value)} required placeholder="0.00" />
                            </div>
                            <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
                                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                                <button type="submit" className="btn btn-primary">{budget ? 'Update' : 'Add'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function DayModal({ day, onClose, onSave }) {
            const [dayNum, setDayNum] = useState(day?.day || '');
            const [date, setDate] = useState(day?.date || '');
            const [location, setLocation] = useState(day?.location || '');
            const [highlights, setHighlights] = useState(day?.highlights || '');
            const [cost, setCost] = useState(day?.cost || '');

            return (
                <div className="modal active" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{day ? 'Edit Day' : 'Add New Day'}</h3>
                        </div>
                        <form onSubmit={(e) => { 
                            e.preventDefault(); 
                            if(dayNum && date && location && highlights && cost) {
                                onSave({ day: dayNum, date, location, highlights, cost: parseFloat(cost) }); 
                            }
                        }}>
                            <div className="form-group">
                                <label>Day Label *</label>
                                <input type="text" value={dayNum} onChange={(e) => setDayNum(e.target.value)} required placeholder="e.g., Day 15" />
                            </div>
                            <div className="form-group">
                                <label>Date *</label>
                                <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required />
                            </div>
                            <div className="form-group">
                                <label>Location *</label>
                                <input type="text" value={location} onChange={(e) => setLocation(e.target.value)} required placeholder="e.g., Tokyo (Ginza)" />
                            </div>
                            <div className="form-group">
                                <label>Highlights *</label>
                                <textarea value={highlights} onChange={(e) => setHighlights(e.target.value)} required placeholder="What will you do this day?"></textarea>
                            </div>
                            <div className="form-group">
                                <label>Estimated Cost ($) *</label>
                                <input type="number" step="0.01" value={cost} onChange={(e) => setCost(e.target.value)} required placeholder="0.00" />
                            </div>
                            <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
                                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                                <button type="submit" className="btn btn-primary">{day ? 'Update' : 'Add Day'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function LinkModal({ link, onClose, onSave }) {
            const [title, setTitle] = useState(link?.title || '');
            const [url, setUrl] = useState(link?.url || '');
            const [description, setDescription] = useState(link?.description || '');
            const [category, setCategory] = useState(link?.category || '');

            return (
                <div className="modal active" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{link ? 'Edit Link' : 'Add Link'}</h3>
                        </div>
                        <form onSubmit={(e) => { 
                            e.preventDefault(); 
                            if(title && url) onSave({ title, url, description, category }); 
                        }}>
                            <div className="form-group">
                                <label>Link Title *</label>
                                <input 
                                    type="text" 
                                    value={title} 
                                    onChange={(e) => setTitle(e.target.value)} 
                                    required 
                                    placeholder="e.g., Hotel Reservation" 
                                />
                            </div>
                            <div className="form-group">
                                <label>URL *</label>
                                <input 
                                    type="url" 
                                    value={url} 
                                    onChange={(e) => setUrl(e.target.value)} 
                                    required 
                                    placeholder="https://..." 
                                />
                            </div>
                            <div className="form-group">
                                <label>Description</label>
                                <input 
                                    type="text" 
                                    value={description} 
                                    onChange={(e) => setDescription(e.target.value)} 
                                    placeholder="Brief note about this link" 
                                />
                            </div>
                            <div className="form-group">
                                <label>Category</label>
                                <input 
                                    type="text" 
                                    value={category} 
                                    onChange={(e) => setCategory(e.target.value)} 
                                    placeholder="e.g., Hotels, Transport, Food" 
                                />
                            </div>
                            <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
                                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
                                <button type="submit" className="btn btn-primary">{link ? 'Update' : 'Add Link'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
